apiVersion: v1
kind: Namespace
metadata:
  name: ais-minecraft
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: ais-minecraft
  namespace: ais-minecraft
spec:
  interval: 1m
  url: https://github.com/The5imon/ais-minecraft
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ais-minecraft
  namespace: ais-minecraft
spec:
  interval: 10m
  targetNamespace: ais-minecraft
  sourceRef:
    kind: GitRepository
    name: ais-minecraft
  path: "."
  prune: true
  wait: true